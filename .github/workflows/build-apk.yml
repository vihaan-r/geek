name: Build Android APK

on:
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      # Note: To bundle the model directly into the APK, you would download the 
      # ONNX files here into public/models/onnx-community/SmolLM2-135M-Instruct
      # For this setup, the app downloads and caches the model on first launch.

      - name: Build Web App
        run: npm run build

      - name: Add Android Platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        cd android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
